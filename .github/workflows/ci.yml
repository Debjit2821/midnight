name: Midnight Credential Vault CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run ESLint/Linter Check
      run: |
        cd frontend
        npm run lint --if-present

    - name: Run Automated Contract & Privacy Tests
      run: |
        cd frontend
        npm run test

    - name: Compile and Build Production Bundle
      run: |
        cd frontend
        npm run build
